<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PLT Network</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #00ff88; --bg: #080808; --card: #151515; }
        body { background: var(--bg); color: white; font-family: 'Cairo', sans-serif; margin: 0; padding: 0; user-select: none; }
        .app { padding: 20px; text-align: center; }
        
        /* الرصيد */
        .balance-box { margin: 20px 0; }
        .balance-val { font-size: 50px; font-weight: 900; color: var(--primary); text-shadow: 0 0 15px rgba(0,255,136,0.3); }
        
        /* دائرة التعدين التلقائي */
        .mining-container { position: relative; width: 220px; height: 220px; margin: 30px auto; border-radius: 50%; background: radial-gradient(circle, #111 0%, #000 100%); border: 2px solid #222; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .mining-status { font-size: 14px; color: var(--primary); margin-top: 10px; }
        .timer { font-family: monospace; font-size: 18px; color: #888; }
        
        /* أزرار المهام */
        .section-title { text-align: right; font-size: 16px; color: #666; margin: 20px 5px 10px; }
        .task-card { background: var(--card); border-radius: 12px; padding: 12px; display: flex; align-items: center; margin-bottom: 10px; border: 1px solid #222; }
        .task-icon { width: 40px; height: 40px; background: #1a1a1a; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-left: 12px; }
        .task-info { flex-grow: 1; text-align: right; }
        .task-name { font-size: 14px; font-weight: bold; display: block; }
        .task-reward { font-size: 11px; color: var(--primary); }
        .btn-action { background: var(--primary); color: #000; border: none; padding: 6px 15px; border-radius: 8px; font-weight: bold; font-size: 12px; }
        .btn-action:disabled { background: #333; color: #777; }

        /* الشريط السفلي */
        .nav { position: fixed; bottom: 0; width: 100%; background: #0a0a0a; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #1a1a1a; }
        .nav-link { color: #555; text-decoration: none; font-size: 10px; }
        .nav-link.active { color: var(--primary); }
        .nav-link i { font-size: 20px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="app">
    <div class="balance-box">
        <div style="font-size: 12px; color: #666;">رصيدك المتوفر</div>
        <div class="balance-val" id="balance">0.00</div>
        <div style="font-size: 11px; letter-spacing: 2px;">PLT TOKEN</div>
    </div>

    <div class="mining-container" id="mine-trigger" onclick="startMining()">
        <i class="fas fa-microchip" id="mine-icon" style="font-size: 60px; color: #333;"></i>
        <div id="mine-text" class="mining-status">اضغط لبدء التعدين</div>
        <div id="timer" class="timer">24:00:00</div>
    </div>

    <div class="section-title">المهام والمكافآت</div>

    <div class="task-card">
        <div class="task-icon"><i class="fas fa-calendar-check" style="color: #ffcc00;"></i></div>
        <div class="task-info">
            <span class="task-name">التسجيل اليومي</span>
            <span class="task-reward">+1.00 PLT</span>
        </div>
        <button class="btn-action" onclick="dailyCheck(this)">استلام</button>
    </div>

    <div class="task-card">
        <div class="task-icon"><i class="fas fa-ad" style="color: var(--primary);"></i></div>
        <div class="task-info">
            <span class="task-name">مشاهدة إعلان ممول</span>
            <span class="task-reward">+0.50 PLT</span>
        </div>
        <button class="btn-action" onclick="window.open('رابط_موقع_الإعلانات_الخاص_بك')">فتح</button>
    </div>

    <div class="task-card">
        <div class="task-icon"><i class="fas fa-users-beam" style="color: #00d2ff;"></i></div>
        <div class="task-info">
            <span class="task-name">دعوة 5 أصدقاء</span>
            <span class="task-reward">+5.00 PLT</span>
        </div>
        <button class="btn-action" onclick="tg.showAlert('رابط إحالتك قيد التحضير')">دعوة</button>
    </div>

    <div style="height: 80px;"></div>
</div>

<nav class="nav">
    <a href="#" class="nav-link active"><i class="fas fa-house"></i>الرئيسية</a>
    <a href="#" class="nav-link" onclick="tg.showAlert('قريباً')"><i class="fas fa-bolt"></i>المهام</a>
    <a href="#" class="nav-item" onclick="tg.showAlert('قريباً')"><i class="fas fa-wallet"></i>المحفظة</a>
</nav>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();

    let balance = parseFloat(localStorage.getItem('plt_b')) || 0;
    let isMining = localStorage.getItem('mining_active') === 'true';
    let endTime = localStorage.getItem('mine_end');

    document.getElementById('balance').innerText = balance.toFixed(2);

    function startMining() {
        if (isMining) return;
        isMining = true;
        endTime = Date.now() + (24 * 60 * 60 * 1000); // 24 ساعة
        localStorage.setItem('mining_active', 'true');
        localStorage.setItem('mine_end', endTime);
        updateMiningUI();
    }

    function updateMiningUI() {
        if (!isMining) return;
        
        const icon = document.getElementById('mine-icon');
        const text = document.getElementById('mine-text');
        const timerEl = document.getElementById('timer');

        icon.style.color = "var(--primary)";
        icon.classList.add('fa-spin');
        text.innerText = "جاري التعدين...";

        const interval = setInterval(() => {
            const now = Date.now();
            const diff = endTime - now;

            if (diff <= 0) {
                clearInterval(interval);
                finishMining();
            } else {
                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                timerEl.innerText = `${h}:${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
                
                // إضافة جزء بسيط من العملة كل ثانية لزيادة الحماس
                balance += 0.00001;
                document.getElementById('balance').innerText = balance.toFixed(2);
                localStorage.setItem('plt_b', balance);
            }
        }, 1000);
    }

    function finishMining() {
        isMining = false;
        localStorage.setItem('mining_active', 'false');
        document.getElementById('mine-icon').classList.remove('fa-spin');
        document.getElementById('mine-text').innerText = "انتهى! اضغط للبدء";
        tg.showAlert("انتهت دورة التعدين! تم إضافة الأرباح.");
    }

    function dailyCheck(btn) {
        balance += 1;
        document.getElementById('balance').innerText = balance.toFixed(2);
        localStorage.setItem('plt_b', balance);
        btn.disabled = true;
        btn.innerText = "تم ✅";
    }

    if (isMining) updateMiningUI();
</script>
</body>
</html>
