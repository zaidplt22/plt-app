<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
body { background: #121212; color: white; font-family: sans-serif; text-align: center; padding: 15px; margin: 0; }
.card { background: #1e1e1e; padding: 20px; border-radius: 20px; border: 1px solid #333; margin-bottom: 15px; }
.balance { font-size: 35px; color: #00ff00; font-weight: bold; margin: 10px 0; }
.btn { background: #0088cc; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; margin-top: 10px; cursor: pointer; }
.btn:disabled { background: #444; color: #888; }
</style>
</head>
<body>
<div class="card">
<h3>الرصيد</h3>
<div class="balance" id="bal">0.00</div>
<span>PLT</span>
<button class="btn" style="background:#f39c12" onclick="daily()">🎁 مكافأة يومية (+5)</button>
</div>
<div class="card">
<button class="btn" onclick="mine(this)">⛏ تعدين (+2)</button>
<button class="btn" style="background:#28a745" onclick="task(this,10,'https://t.me/your_channel')">📢 تابعنا (+10)</button>
</div>
<script>
const tg = window.Telegram.WebApp;
tg.ready(); tg.expand();
let b = parseFloat(localStorage.getItem('p_b')) || 0;
document.getElementById('bal').innerText = b.toFixed(2);
function up(a) { b += a; localStorage.setItem('p_b', b); document.getElementById('bal').innerText = b.toFixed(2); }
function daily() {
const l = localStorage.getItem('l_d'), n = Date.now();
if (l && (n - l < 86400000)) { tg.showAlert("عد بعد 24 ساعة"); }
else { up(5); localStorage.setItem('l_d', n); tg.showAlert("تم استلام 5 عملات"); }
}
function mine(btn) {
btn.disabled = true; btn.innerText = "جاري..";
setTimeout(() => { up(2); tg.showAlert("انتهى التعدين (+2)"); btn.innerText = "تم ✅"; }, 5000);
}
function task(btn, r, link) {
if(link) tg.openTelegramLink(link);
setTimeout(() => { up(r); btn.disabled = true; btn.innerText = "تم ✅"; }, 2000);
}
</script>
</body>
</html>
